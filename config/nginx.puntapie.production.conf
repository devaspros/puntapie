server {
  listen 80;
  server_name puntapie.devaspros.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name puntapie.devaspros.com;

  ssl_certificate /etc/letsencrypt/live/puntapie.devaspros.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/puntapie.devaspros.com/privkey.pem;

  # Logs
  access_log /var/log/nginx/puntapie.access.log;
  error_log /var/log/nginx/puntapie.error.log info;

  # Rails public assets
  root /home/ubuntu/puntapie/app/public;

  client_max_body_size 10M;
  keepalive_timeout 5;

  # Static files directo por nginx
  location ~ ^/(assets|packs|images|favicon.ico|robots.txt) {
    expires max;
    add_header Cache-Control public;
    try_files $uri =404;
  }

  # App (Puma)
  location / {
    proxy_pass http://localhost:3000;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # WebSockets / ActionCable (por si lo usas)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  error_page 500 502 503 504 /500.html;
}
